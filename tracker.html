<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Конкурс Факультетов</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gryf-gold: #f0c040;
    --gryf-red: #740001;
    --gryf-red-light: #ae0001;
    --slyth-green: #1a472a;
    --slyth-silver: #aaaaaa;
    --slyth-green-light: #2a623d;
    --huff-yellow: #ecb939;
    --huff-black: #372e29;
    --huff-yellow-light: #f0d060;
    --raven-blue: #0e1a40;
    --raven-bronze: #946b2d;
    --raven-blue-light: #222f5b;
    --parchment: #f4e8c1;
    --parchment-dark: #e8d5a0;
    --ink: #2c1810;
    --gold-accent: #c9a84c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Crimson Text', Georgia, serif;
    background: #1a1008;
    color: var(--ink);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at top, #0d0d1a 0%, #1a1008 60%);
  }

  .stars::before {
    content: '';
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-image:
      radial-gradient(1px 1px at 20% 15%, rgba(255,255,220,0.6) 0%, transparent 50%),
      radial-gradient(1px 1px at 45% 8%, rgba(255,255,220,0.4) 0%, transparent 50%),
      radial-gradient(1px 1px at 70% 20%, rgba(255,255,220,0.5) 0%, transparent 50%),
      radial-gradient(1px 1px at 85% 5%, rgba(255,255,220,0.3) 0%, transparent 50%),
      radial-gradient(1px 1px at 10% 30%, rgba(255,255,220,0.4) 0%, transparent 50%),
      radial-gradient(1px 1px at 60% 35%, rgba(255,255,220,0.3) 0%, transparent 50%),
      radial-gradient(1px 1px at 30% 50%, rgba(255,255,220,0.2) 0%, transparent 50%),
      radial-gradient(1px 1px at 90% 45%, rgba(255,255,220,0.5) 0%, transparent 50%);
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px 60px;
  }

  /* HEADER */
  .header {
    text-align: center;
    padding: 50px 20px 30px;
    position: relative;
  }

  .header-crest {
    font-size: 52px;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.6));
  }

  .header-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(24px, 5vw, 44px);
    font-weight: 700;
    color: var(--gold-accent);
    letter-spacing: 0.08em;
    text-shadow: 0 0 40px rgba(201,168,76,0.4), 2px 2px 0 rgba(0,0,0,0.8);
    line-height: 1.2;
    margin-bottom: 8px;
  }

  .header-subtitle {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 18px;
    color: rgba(201,168,76,0.7);
    letter-spacing: 0.05em;
  }

  .divider {
    width: 60%;
    max-width: 500px;
    margin: 20px auto;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold-accent), transparent);
    position: relative;
  }

  .divider::before {
    content: '⚡';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: #1a1008;
    padding: 0 12px;
    font-size: 16px;
    line-height: 1;
    color: var(--gold-accent);
  }

  /* WEEK TABS */
  .week-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin: 30px 0 24px;
    flex-wrap: wrap;
  }

  .week-tab {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 10px 22px;
    border: 1.5px solid rgba(201,168,76,0.4);
    background: rgba(201,168,76,0.05);
    color: rgba(201,168,76,0.6);
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.25s;
  }

  .week-tab:hover {
    border-color: rgba(201,168,76,0.7);
    color: var(--gold-accent);
    background: rgba(201,168,76,0.1);
  }

  .week-tab.active {
    border-color: var(--gold-accent);
    color: var(--ink);
    background: var(--gold-accent);
  }

  /* SCOREBOARD BANNER */
  .scoreboard {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
    background: rgba(201,168,76,0.07);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 8px;
    padding: 20px 24px;
    margin-bottom: 32px;
  }

  .score-faculty {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .score-faculty.right { text-align: right; }

  .score-faculty-name {
    font-family: 'Cinzel', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.6);
  }

  .score-points {
    font-family: 'Cinzel', serif;
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
  }

  .score-center {
    text-align: center;
  }

  .score-vs {
    font-family: 'Cinzel', serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: rgba(201,168,76,0.4);
    margin-bottom: 6px;
  }

  .score-leader {
    font-family: 'Crimson Text', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--gold-accent);
  }

  /* FACULTY SECTIONS */
  .faculties-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(520px, 1fr));
    gap: 24px;
    margin-bottom: 32px;
  }

  @media (max-width: 600px) {
    .faculties-grid { grid-template-columns: 1fr; }
  }

  .faculty-card {
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.08);
  }

  .faculty-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .faculty-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .faculty-crest {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    border: 2px solid rgba(255,255,255,0.2);
  }

  .faculty-name {
    font-family: 'Cinzel', serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.06em;
  }

  .faculty-total {
    font-family: 'Cinzel', serif;
    font-size: 22px;
    font-weight: 700;
    text-align: right;
  }

  .faculty-total-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0.65;
    font-family: 'Cinzel', serif;
  }

  /* TABLE */
  .faculty-table-wrap {
    background: rgba(244,232,193,0.96);
    padding: 0;
  }

  table.operators {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    color: var(--ink);
  }

  table.operators thead tr {
    border-bottom: 2px solid rgba(44,24,16,0.15);
  }

  table.operators th {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 9px 10px;
    text-align: center;
    color: rgba(44,24,16,0.55);
  }

  table.operators th:first-child { text-align: left; padding-left: 16px; }

  table.operators td {
    padding: 9px 10px;
    text-align: center;
    border-bottom: 1px solid rgba(44,24,16,0.07);
    color: var(--ink);
    font-size: 14px;
  }

  table.operators td:first-child {
    text-align: left;
    padding-left: 16px;
    font-weight: 600;
    font-size: 13.5px;
  }

  table.operators tr:last-child td { border-bottom: none; }

  table.operators tbody tr:hover {
    background: rgba(201,168,76,0.12);
  }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    font-weight: 700;
    margin-right: 6px;
  }

  .rank-1 { background: #c9a84c; color: #fff; }
  .rank-2 { background: #aaaaaa; color: #fff; }
  .rank-3 { background: #cd7f32; color: #fff; }
  .rank-other { background: rgba(44,24,16,0.12); color: var(--ink); font-size: 10px; }

  .score-bar-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .score-bar {
    height: 6px;
    border-radius: 3px;
    flex: 1;
    background: rgba(44,24,16,0.1);
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .pts-value {
    font-family: 'Cinzel', serif;
    font-weight: 700;
    font-size: 14px;
    min-width: 46px;
    text-align: right;
  }

  /* TOTAL ROW */
  .total-row td {
    font-family: 'Cinzel', serif;
    font-weight: 700 !important;
    font-size: 13px !important;
    background: rgba(44,24,16,0.05);
    border-top: 2px solid rgba(44,24,16,0.12) !important;
    border-bottom: none !important;
  }

  /* OVERALL RANKING */
  .ranking-section {
    background: rgba(244,232,193,0.04);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 8px;
    overflow: hidden;
  }

  .ranking-header {
    padding: 16px 24px;
    background: rgba(201,168,76,0.08);
    border-bottom: 1px solid rgba(201,168,76,0.2);
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--gold-accent);
    text-align: center;
  }

  .ranking-list {
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .ranking-row {
    display: grid;
    grid-template-columns: 40px 1fr 80px 60px;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: rgba(244,232,193,0.06);
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.05);
    transition: background 0.2s;
  }

  .ranking-row:hover { background: rgba(244,232,193,0.1); }

  .ranking-pos {
    font-family: 'Cinzel', serif;
    font-size: 18px;
    font-weight: 700;
    text-align: center;
  }

  .ranking-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--parchment);
  }

  .ranking-faculty-tag {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.06em;
    padding: 3px 8px;
    border-radius: 3px;
    text-align: center;
  }

  .ranking-pts {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 700;
    text-align: right;
  }

  /* FACULTY COLORS */
  .gryf .faculty-header { background: linear-gradient(135deg, #740001, #ae0001); }
  .gryf .faculty-name { color: var(--gryf-gold); }
  .gryf .faculty-total { color: var(--gryf-gold); }
  .gryf .faculty-total-label { color: rgba(240,192,64,0.65); }
  .gryf .faculty-crest { background: rgba(240,192,64,0.15); }
  .gryf .score-bar-fill { background: var(--gryf-red-light); }
  .gryf .pts-value { color: var(--gryf-red-light); }

  .slyth .faculty-header { background: linear-gradient(135deg, #1a472a, #2a623d); }
  .slyth .faculty-name { color: var(--slyth-silver); }
  .slyth .faculty-total { color: #e0e0e0; }
  .slyth .faculty-total-label { color: rgba(170,170,170,0.65); }
  .slyth .faculty-crest { background: rgba(170,170,170,0.1); }
  .slyth .score-bar-fill { background: #2a7d4f; }
  .slyth .pts-value { color: #2a7d4f; }

  .huff .faculty-header { background: linear-gradient(135deg, #372e29, #4a3c34); }
  .huff .faculty-name { color: var(--huff-yellow); }
  .huff .faculty-total { color: var(--huff-yellow); }
  .huff .faculty-total-label { color: rgba(236,185,57,0.65); }
  .huff .faculty-crest { background: rgba(236,185,57,0.15); }
  .huff .score-bar-fill { background: var(--huff-yellow); }
  .huff .pts-value { color: #b8860b; }

  .raven .faculty-header { background: linear-gradient(135deg, #0e1a40, #1a2a5e); }
  .raven .faculty-name { color: var(--raven-bronze); }
  .raven .faculty-total { color: var(--raven-bronze); }
  .raven .faculty-total-label { color: rgba(148,107,45,0.65); }
  .raven .faculty-crest { background: rgba(148,107,45,0.15); }
  .raven .score-bar-fill { background: var(--raven-bronze); }
  .raven .pts-value { color: var(--raven-bronze); }

  /* SCORE BOARD COLORS */
  .gryf-score { color: var(--gryf-red-light); }
  .slyth-score { color: #2a9d5f; }
  .huff-score { color: var(--huff-yellow); }
  .raven-score { color: var(--raven-bronze); }

  /* RANKING TAG COLORS */
  .tag-gryf { background: rgba(174,0,1,0.2); color: #e05050; }
  .tag-slyth { background: rgba(26,71,42,0.4); color: #60c080; }
  .tag-huff { background: rgba(55,46,41,0.5); color: #e0b030; }
  .tag-raven { background: rgba(14,26,64,0.5); color: #8090e0; }

  .section-label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.5);
    text-align: center;
    margin-bottom: 14px;
  }

  .neg { color: #c0392b; font-size: 12px; }
</style>
</head>

const COLS = ['КЗЧ','QA','CSat','Эфф%','Часы%','Нар.','Опозд.','Баллы'];

let currentWeek = 4; // default to "Итоги месяца"

function calcTotals(weekIdx) {
  // weekIdx = 0-3 for specific weeks, 4 = all weeks sum
  const result = FACULTIES.map((fac, fi) => {
    return fac.operators.map((name, oi) => {
      if (weekIdx < 4) {
        return { name, pts: WEEKLY_DATA[weekIdx][fi][oi][7] };
      } else {
        let total = 0;
        for (let w = 0; w < 4; w++) total += WEEKLY_DATA[w][fi][oi][7];
        return { name, pts: total };
      }
    });
  });
  return result;
}

function getFacultyTotal(facIdx, weekIdx) {
  if (weekIdx < 4) {
    return WEEKLY_DATA[weekIdx][facIdx].reduce((s, r) => s + r[7], 0);
  } else {
    let total = 0;
    for (let w = 0; w < 4; w++) {
      total += WEEKLY_DATA[w][facIdx].reduce((s, r) => s + r[7], 0);
    }
    return total;
  }
}

function fmtPts(v) {
  return Number.isInteger(v) ? v.toString() : v.toFixed(1);
}

function renderScoreboard(weekIdx) {
  const totals = FACULTIES.map((f, i) => ({ ...f, total: getFacultyTotal(i, weekIdx) }));
  totals.sort((a, b) => b.total - a.total);

  const top2 = totals.slice(0, 2);
  const leader = top2[0];
  const second = top2[1];

  const html = `
    <div class="score-faculty">
      <div class="score-faculty-name" style="color:rgba(201,168,76,0.6)">${top2[0].icon} ${top2[0].name}</div>
      <div class="score-points ${top2[0].scoreCls}">${fmtPts(top2[0].total)}</div>
    </div>
    <div class="score-center">
      <div class="score-vs">СЧЁТ ФАКУЛЬТЕТОВ</div>
      <div class="score-leader">🏆 Ведёт: ${leader.name}</div>
      <div style="font-size:11px;color:rgba(201,168,76,0.4);margin-top:4px;font-family:'Cinzel',serif;">
        +${fmtPts(top2[0].total - top2[1].total)} очков
      </div>
    </div>
    <div class="score-faculty right">
      <div class="score-faculty-name">${top2[1].icon} ${top2[1].name}</div>
      <div class="score-points ${top2[1].scoreCls}">${fmtPts(top2[1].total)}</div>
    </div>
  `;
  document.getElementById('scoreboard').innerHTML = html;
}

function renderFacultyCards(weekIdx) {
  const grid = document.getElementById('faculty-grid');
  const allTotals = calcTotals(weekIdx);
  const maxPts = Math.max(...allTotals.flat().map(o => o.pts));

  let html = '';
  FACULTIES.forEach((fac, fi) => {
    const facTotal = getFacultyTotal(fi, weekIdx);
    const operators = allTotals[fi].slice().sort((a, b) => b.pts - a.pts);
    const allRanked = allTotals.flat().slice().sort((a, b) => b.pts - a.pts);

    let rows = '';
    operators.forEach((op, rank) => {
      const globalRank = allRanked.findIndex(r => r.name === op.name) + 1;
      let badge = '';
      if (globalRank === 1) badge = `<span class="rank-badge rank-1">1</span>`;
      else if (globalRank === 2) badge = `<span class="rank-badge rank-2">2</span>`;
      else if (globalRank === 3) badge = `<span class="rank-badge rank-3">3</span>`;
      else badge = `<span class="rank-badge rank-other">${globalRank}</span>`;

      // find weekly data
      let weekPts = [];
      if (weekIdx < 4) {
        const origIdx = fac.operators.indexOf(op.name);
        const row = WEEKLY_DATA[weekIdx][fi][origIdx];
        // show all metrics
        const penalty = -(row[5]*30 + row[6]*2);
        weekPts = row.slice(0, 7);
      }

      const pct = Math.round((op.pts / maxPts) * 100);

      rows += `<tr>
        <td>${badge}${op.name}</td>
        ${weekIdx < 4 ? weekPts.map((v,i) => {
          if (i === 5 && v > 0) return `<td class="neg">-${v}</td>`;
          if (i === 6 && v > 0) return `<td class="neg">${v}'</td>`;
          return `<td>${v}</td>`;
        }).join('') : ''}
        <td>
          <div class="score-bar-wrap">
            <div class="score-bar"><div class="score-bar-fill" style="width:${pct}%"></div></div>
            <span class="pts-value">${fmtPts(op.pts)}</span>
          </div>
        </td>
      </tr>`;
    });

    const colHeaders = weekIdx < 4
      ? COLS.slice(0,7).map(c => `<th>${c}</th>`).join('') + '<th>Баллы</th>'
      : '<th>Баллы (итого)</th>';

    html += `
    <div class="faculty-card ${fac.cls}">
      <div class="faculty-header">
        <div class="faculty-header-left">
          <div class="faculty-crest">${fac.icon}</div>
          <div class="faculty-name">${fac.name}</div>
        </div>
        <div>
          <div class="faculty-total">${fmtPts(facTotal)}</div>
          <div class="faculty-total-label">очков</div>
        </div>
      </div>
      <div class="faculty-table-wrap">
        <table class="operators">
          <thead>
            <tr>
              <th>Оператор</th>
              ${colHeaders}
            </tr>
          </thead>
          <tbody>
            ${rows}
            <tr class="total-row">
              <td colspan="${weekIdx < 4 ? 9 : 2}" style="text-align:right;padding-right:12px;color:rgba(44,24,16,0.6);font-size:11px">ИТОГО</td>
              <td>
                <div class="score-bar-wrap">
                  <span class="pts-value">${fmtPts(facTotal)}</span>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>`;
  });

  grid.innerHTML = html;
}

function renderRanking(weekIdx) {
  const allOps = [];
  FACULTIES.forEach((fac, fi) => {
    fac.operators.forEach((name, oi) => {
      let pts = 0;
      if (weekIdx < 4) pts = WEEKLY_DATA[weekIdx][fi][oi][7];
      else { for (let w=0;w<4;w++) pts += WEEKLY_DATA[w][fi][oi][7]; }
      allOps.push({ name, fac, pts });
    });
  });
  allOps.sort((a, b) => b.pts - a.pts);

  let html = '';
  allOps.forEach((op, i) => {
    const pos = i + 1;
    let posColor = 'rgba(201,168,76,0.4)';
    let posStr = pos;
    if (pos === 1) posColor = '#c9a84c';
    else if (pos === 2) posColor = '#aaa';
    else if (pos === 3) posColor = '#cd7f32';

    html += `
    <div class="ranking-row">
      <div class="ranking-pos" style="color:${posColor}">${pos}</div>
      <div class="ranking-name">${op.name}</div>
      <div class="ranking-faculty-tag ${op.fac.tagCls}">${op.fac.icon} ${op.fac.name}</div>
      <div class="ranking-pts ${op.fac.scoreCls}">${fmtPts(op.pts)}</div>
    </div>`;
  });

  document.getElementById('ranking-list').innerHTML = html;
}

function showWeek(idx) {
  currentWeek = idx;
  document.querySelectorAll('.week-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });
  renderScoreboard(idx);
  renderFacultyCards(idx);
  renderRanking(idx);
}

showWeek(4);
</script>
